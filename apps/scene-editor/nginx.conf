# 前端静态托管 + 同域反向代理。证书挂载到 /etc/nginx/certs（见 prod compose 的 web.volumes）。

# HTTP：全部重定向到 HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS：托管前端 + 反代后端
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # 把你的证书放到宿主机并在 compose 里挂载到该路径
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # 上传上限需 ≥ 后端 multipart 的 50MB
    client_max_body_size 60m;

    root /usr/share/nginx/html;
    index index.html;

    # 前端 SPA：找不到文件回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反代到 server 容器（compose 内用服务名 server:3100）
    location /api/ {
        proxy_pass http://server:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # AI 对话为 SSE 流式响应，关闭缓冲避免卡顿
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    # 后端上传的静态资源
    location /uploads/ {
        proxy_pass http://server:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
